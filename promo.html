  <div class="container">
    <div class="header">
      <h1>Current Promotions</h1>
      <p>View all active and upcoming promotional offers</p>
    </div>

    <div id="alert" class="error" style="display: none;"></div>

    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p style="margin-top: 1rem; color: #666;">Loading promotions...</p>
    </div>

    <div id="current" class="section" style="display: none;">
      <h2>Active Now</h2>
      <div id="currentPromos" class="card-grid"></div>
    </div>

    <div id="upcoming" class="section" style="display: none;">
      <h2>Coming Soon</h2>
      <div id="upcomingPromos" class="card-grid"></div>
    </div>

    <div id="expired" class="section" style="display: none;">
      <h2>Recently Ended</h2>
      <div id="expiredPromos" class="card-grid"></div>
    </div>
  </div>

  <script>
    // ========== CONFIGURATION ==========
    // REPLACE THESE WITH YOUR ACTUAL VALUES
    const LOCATION_ID = 'YOUR_LOCATION_ID_HERE';
    const API_KEY = 'YOUR_API_KEY_HERE';
    // ===================================

    async function fetchPromotions() {
      const loadingEl = document.getElementById('loading');
      const alertEl = document.getElementById('alert');
      
      // Show loading
      loadingEl.style.display = 'block';
      alertEl.style.display = 'none';

      try {
        // Validate credentials
        if (LOCATION_ID === 'EY0n2rtraCf6EEUKpaEE' || API_KEY === 'pit-e475c122-5128-42e9-97e9-e2ceb26f1401') {
          throw new Error('API credentials not configured. Replace LOCATION_ID and API_KEY in the code.');
        }

        // Fetch opportunities
        const response = await fetch(
          `https://api.gohighlevel.com/v1/opportunities?locationId=$EY0n2rtraCf6EEUKpaEE&status=Open`,
          {
            method: 'GET',
            headers: {
              'Authorization': `Bearer $pit-e475c122-5128-42e9-97e9-e2ceb26f1401`,
              'Content-Type': 'application/json'
            }
          }
        );

        if (!response.ok) {
          if (response.status === 401) {
            throw new Error('Invalid API Key. Check your credentials.');
          } else if (response.status === 404) {
            throw new Error('Invalid Location ID. Check your credentials.');
          } else {
            throw new Error(`API error: ${response.status} ${response.statusText}`);
          }
        }

        const data = await response.json();
        const opportunities = data.opportunities || [];

        // Filter for promotions (look for promo-related keywords)
        const promotions = opportunities.filter(opp => {
          const title = (opp.title || '').toLowerCase();
          const desc = (opp.description || '').toLowerCase();
          
          // Include if title or description contains promotional keywords
          return (
            title.includes('promo') ||
            title.includes('sale') ||
            title.includes('offer') ||
            title.includes('discount') ||
            title.includes('deal') ||
            desc.includes('promo code') ||
            desc.includes('promotional')
          );
        });

        if (promotions.length === 0) {
          showError('No promotions found. Make sure opportunities have promotional keywords in the title or description.');
          loadingEl.style.display = 'none';
          return;
        }

        displayPromotions(promotions);
        loadingEl.style.display = 'none';

      } catch (error) {
        console.error('Error:', error);
        showError(`Error loading promotions: ${error.message}`);
        loadingEl.style.display = 'none';
      }
    }

    function displayPromotions(promotions) {
      const now = new Date();
      const current = [];
      const upcoming = [];
      const expired = [];

      promotions.forEach(opp => {
        const startDate = opp.dateStart ? new Date(opp.dateStart) : null;
        const endDate = opp.dueDate ? new Date(opp.dueDate) : null;

        if (startDate && endDate) {
          if (startDate <= now && endDate >= now) {
            current.push(opp);
          } else if (startDate > now) {
            upcoming.push(opp);
          } else if (endDate < now) {
            expired.push(opp);
          }
        }
      });

      // Sort
      current.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));
      upcoming.sort((a, b) => new Date(a.dateStart) - new Date(b.dateStart));
      expired.sort((a, b) => new Date(b.dueDate) - new Date(a.dueDate));

      // Render
      renderSection(current, 'currentPromos', 'current');
      renderSection(upcoming, 'upcomingPromos', 'upcoming');
      renderSection(expired, 'expiredPromos', 'expired');
    }

    function renderSection(promos, containerId, sectionId) {
      const container = document.getElementById(containerId);
      const section = document.getElementById(sectionId);

      if (promos.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      container.innerHTML = promos.map(createCard).join('');
    }

    function createCard(opp) {
      const startDate = new Date(opp.dateStart);
      const endDate = new Date(opp.dueDate);
      const now = new Date();

      // Determine status badge
      let badge = 'badge-upcoming';
      let badgeText = 'Upcoming';
      
      if (startDate <= now && endDate >= now) {
        badge = 'badge-active';
        badgeText = 'Active Now';
      } else if (endDate < now) {
        badge = 'badge-ending';
        badgeText = 'Ended';
      }

      // Parse description to extract promo code and renewal flag
      const desc = opp.description || '';
      const promoMatch = desc.match(/(?:Promo Code|Code|Discount Code)[:\s]+([^\n]+)/i);
      const promoCode = promoMatch ? promoMatch[1].trim() : null;
      const needsRenewal = desc.toLowerCase().includes('renewal') || desc.toLowerCase().includes('renew');

      // Clean description (remove promo code line if present)
      let cleanDesc = desc;
      if (promoMatch) {
        cleanDesc = desc.replace(/Promo Code[:\s]*[^\n]+/i, '').trim();
      }

      return `
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">${escapeHtml(opp.title)}</h3>
            <span class="badge ${badge}">${badgeText}</span>
          </div>
          
          <div class="card-meta">
            <div>
              <p class="meta-label">Starts</p>
              <p class="meta-value">${formatDate(opp.dateStart)}</p>
            </div>
            <div>
              <p class="meta-label">Ends</p>
              <p class="meta-value">${formatDate(opp.dueDate)}</p>
            </div>
          </div>

          ${cleanDesc ? `<p class="card-description">${escapeHtml(cleanDesc)}</p>` : ''}
          
          ${promoCode ? `
            <div class="promo-code">
              <div class="promo-label">Promo Code</div>
              ${escapeHtml(promoCode)}
            </div>
          ` : ''}

          ${needsRenewal ? `
            <div class="renewal-flag">
              <span class="renewal-icon">🔄</span>Review for renewal at end date
            </div>
          ` : ''}
        </div>
      `;
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'TBD';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function showError(msg) {
      const alert = document.getElementById('alert');
      alert.innerHTML = `<span class="error-icon">⚠️</span>${escapeHtml(msg)}`;
      alert.style.display = 'block';
    }

    // Load promotions when page loads
    document.addEventListener('DOMContentLoaded', fetchPromotions);

    // Refresh every 5 minutes (300000 ms)
    setInterval(fetchPromotions, 5 * 60 * 1000);
  </script>

=\"display: none;\">\u003C\u002Fdiv>\n\n    \u003Cdiv id=\"loading\" class=\"loading\" style=\"display: none;\">\n      \u003Cdiv class=\"spinner\">\u003C\u002Fdiv>\n      \u003Cp style=\"margin-top: 1rem; color: #666;\">Loading promotions...\u003C\u002Fp>\n    \u003C\u002Fdiv>\n\n    \u003Cdiv id=\"current\" class=\"section\" style=\"display: none;\">\n      \u003Ch2>Active Now\u003C\u002Fh2>\n      \u003Cdiv id=\"currentPromos\" class=\"card-grid\">\u003C\u002Fdiv>\n    \u003C\u002Fdiv>\n\n    \u003Cdiv id=\"upcoming\" class=\"section\" style=\"display: none;\">\n      \u003Ch2>Coming Soon\u003C\u002Fh2>\n      \u003Cdiv id=\"upcomingPromos\" class=\"card-grid\">\u003C\u002Fdiv>\n    \u003C\u002Fdiv>\n\n    \u003Cdiv id=\"expired\" class=\"section\" style=\"display: none;\">\n      \u003Ch2>Recently Ended\u003C\u002Fh2>\n      \u003Cdiv id=\"expiredPromos\" class=\"card-grid\">\u003C\u002Fdiv>\n    \u003C\u002Fdiv>\n  \u003C\u002Fdiv>\n\n  \u003Cscript>\n    \u002F\u002F ========== CONFIGURATION ==========\n    \u002F\u002F REPLACE THESE WITH YOUR ACTUAL VALUES\n    const LOCATION_ID = 'YOUR_LOCATION_ID_HERE';\n    const API_KEY = 'YOUR_API_KEY_HERE';\n    \u002F\u002F ===================================\n\n    async function fetchPromotions() {\n      const loadingEl = document.getElementById('loading');\n      const alertEl = document.getElementById('alert');\n      \n      \u002F\u002F Show loading\n      loadingEl.style.display = 'block';\n      alertEl.style.display = 'none';\n\n      try {\n        \u002F\u002F Validate credentials\n        if (LOCATION_ID === EY0n2rtraCf6EEUKpaEE || API_KEY === pit-e475c122-5128-42e9-97e9-e2ceb26f1401) {\n          throw new Error('API credentials not configured. Replace LOCATION_ID and API_KEY in the code.');\n        }\n\n        \u002F\u002F Fetch opportunities\n        const response = await fetch(\n          `https:\u002F\u002Fapi.gohighlevel.com\u002Fv1\u002Fopportunities?locationId=$EY0n2rtraCf6EEUKpaEE&status=Open`,\n          {\n            method: 'GET',\n            headers: {\n              'Authorization': `Bearer $pit-e475c122-5128-42e9-97e9-e2ceb26f1401`,\n              'Content-Type': 'application\u002Fjson'\n            }\n          }\n        );\n\n        if (!response.ok) {\n          if (response.status === 401) {\n            throw new Error('Invalid API Key. Check your credentials.');\n          } else if (response.status === 404) {\n            throw new Error('Invalid Location ID. Check your credentials.');\n          } else {\n            throw new Error(`API error: ${response.status} ${response.statusText}`);\n          }\n        }\n\n        const data = await response.json();\n        const opportunities = data.opportunities || [];\n\n        \u002F\u002F Filter for promotions (look for promo-related keywords)\n        const promotions = opportunities.filter(opp => {\n          const title = (opp.title || '').toLowerCase();\n          const desc = (opp.description || '').toLowerCase();\n          \n          \u002F\u002F Include if title or description contains promotional keywords\n          return (\n            title.includes('promo') ||\n            title.includes('sale') ||\n            title.includes('offer') ||\n            title.includes('discount') ||\n            title.includes('deal') ||\n            desc.includes('promo code') ||\n            desc.includes('promotional')\n          );\n        });\n\n        if (promotions.length === 0) {\n          showError('No promotions found. Make sure opportunities have promotional keywords in the title or description.');\n          loadingEl.style.display = 'none';\n          return;\n        }\n\n        displayPromotions(promotions);\n        loadingEl.style.display = 'none';\n\n      } catch (error) {\n        console.error('Error:', error);\n        showError(`Error loading promotions: ${error.message}`);\n        loadingEl.style.display = 'none';\n      }\n    }\n\n    function displayPromotions(promotions) {\n      const now = new Date();\n      const current = [];\n      const upcoming = [];\n      const expired = [];\n\n      promotions.forEach(opp => {\n        const startDate = opp.dateStart ? new Date(opp.dateStart) : null;\n        const endDate = opp.dueDate ? new Date(opp.dueDate) : null;\n\n        if (startDate && endDate) {\n          if (startDate \u003C= now && endDate >= now) {\n            current.push(opp);\n          } else if (startDate > now) {\n            upcoming.push(opp);\n          } else if (endDate \u003C now) {\n            expired.push(opp);\n          }\n        }\n      });\n\n      \u002F\u002F Sort\n      current.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));\n      upcoming.sort((a, b) => new Date(a.dateStart) - new Date(b.dateStart));\n      expired.sort((a, b) => new Date(b.dueDate) - new Date(a.dueDate));\n\n      \u002F\u002F Render\n      renderSection(current, 'currentPromos', 'current');\n      renderSection(upcoming, 'upcomingPromos', 'upcoming');\n      renderSection(expired, 'expiredPromos', 'expired');\n    }\n\n    function renderSection(promos, containerId, sectionId) {\n      const container = document.getElementById(containerId);\n      const section = document.getElementById(sectionId);\n\n      if (promos.length === 0) {\n        section.style.display = 'none';\n        return;\n      }\n\n      section.style.display = 'block';\n      container.innerHTML = promos.map(createCard).join('');\n    }\n\n    function createCard(opp) {\n      const startDate = new Date(opp.dateStart);\n      const endDate = new Date(opp.dueDate);\n      const now = new Date();\n\n      \u002F\u002F Determine status badge\n      let badge = 'badge-upcoming';\n      let badgeText = 'Upcoming';\n      \n      if (startDate \u003C= now && endDate >= now) {\n        badge = 'badge-active';\n        badgeText = 'Active Now';\n      } else if (endDate \u003C now) {\n        badge = 'badge-ending';\n        badgeText = 'Ended';\n      }\n\n      \u002F\u002F Parse description to extract promo code and renewal flag\n      const desc = opp.description || '';\n      const promoMatch = desc.match(\u002F(?:Promo Code|Code|Discount Code)[:\\s]+([^\\n]+)\u002Fi);\n      const promoCode = promoMatch ? promoMatch[1].trim() : null;\n      const needsRenewal = desc.toLowerCase().includes('renewal') || desc.toLowerCase().includes('renew');\n\n      \u002F\u002F Clean description (remove promo code line if present)\n      let cleanDesc = desc;\n      if (promoMatch) {\n        cleanDesc = desc.replace(\u002FPromo Code[:\\s]*[^\\n]+\u002Fi, '').trim();\n      }\n\n      return `\n        \u003Cdiv class=\"card\">\n          \u003Cdiv class=\"card-header\">\n            \u003Ch3 class=\"card-title\">${escapeHtml(opp.title)}\u003C\u002Fh3>\n            \u003Cspan class=\"badge ${badge}\">${badgeText}\u003C\u002Fspan>\n          \u003C\u002Fdiv>\n          \n          \u003Cdiv class=\"card-meta\">\n            \u003Cdiv>\n              \u003Cp class=\"meta-label\">Starts\u003C\u002Fp>\n              \u003Cp class=\"meta-value\">${formatDate(opp.dateStart)}\u003C\u002Fp>\n            \u003C\u002Fdiv>\n            \u003Cdiv>\n              \u003Cp class=\"meta-label\">Ends\u003C\u002Fp>\n              \u003Cp class=\"meta-value\">${formatDate(opp.dueDate)}\u003C\u002Fp>\n            \u003C\u002Fdiv>\n          \u003C\u002Fdiv>\n\n          ${cleanDesc ? `\u003Cp class=\"card-description\">${escapeHtml(cleanDesc)}\u003C\u002Fp>` : ''}\n          \n          ${promoCode ? `\n            \u003Cdiv class=\"promo-code\">\n              \u003Cdiv class=\"promo-label\">Promo Code\u003C\u002Fdiv>\n              ${escapeHtml(promoCode)}\n            \u003C\u002Fdiv>\n          ` : ''}\n\n          ${needsRenewal ? `\n            \u003Cdiv class=\"renewal-flag\">\n              \u003Cspan class=\"renewal-icon\">🔄\u003C\u002Fspan>Review for renewal at end date\n            \u003C\u002Fdiv>\n          ` : ''}\n        \u003C\u002Fdiv>\n      `;\n    }\n\n    function formatDate(dateStr) {\n      if (!dateStr) return 'TBD';\n      const date = new Date(dateStr);\n      return date.toLocaleDateString('en-US', {\n        year: 'numeric',\n        month: 'short',\n        day: 'numeric'\n      });\n    }\n\n    function escapeHtml(text) {\n      if (!text) return '';\n      const map = {\n        '&': '&amp;',\n        '\u003C': '&lt;',\n        '>': '&gt;',\n        '\"': '&quot;',\n        \"'\": '&#039;'\n      };\n      return text.replace(\u002F[&\u003C>\"']\u002Fg, m => map[m]);\n    }\n\n    function showError(msg) {\n      const alert = document.getElementById('alert');\n      alert.innerHTML = `\u003Cspan class=\"error-icon\">⚠️\u003C\u002Fspan>${escapeHtml(msg)}`;\n      alert.style.display = 'block';\n    }\n\n    \u002F\u002F Load promotions when page loads\n    document.addEventListener('DOMContentLoaded', fetchPromotions);\n\n    \u002F\u002F Refresh every 5 minutes (300000 ms)\n    setInterval(fetchPromotions, 5 * 60 * 1000);\n  \u003C\u002Fscript>\n\u003C\u002Fbody>\n\u003C\u002Fhtml>\n",{"value":96},[],"ccustom-code-ROCb5UiE-I","custom-code","c-custom-code",{},[],[],{"title":29,"description":29,"author":29,"imageUrl":29,"isPreviewUrl":25},"test.smart1marketing.com","\u002Fpromos-page","Ddriq8k7LWVBXAUoHr8V","Promos Page","colmyQCuPN9SxcuJfGhc",[],"https:\u002F\u002Fstcdn.leadconnectorhq.com\u002Ffunnel\u002Ficon\u002Ffavicon.ico","EwtsOr9LSXTL55xoagTh","test 1","415ca617-0644-4202-b7f3-e1d05e530231",[],null,["Reactive",117],{"$snuxt-i18n-meta":118,"$spreviewState":119,"$smetaPixelOptions":255},{},{"defaultSettings":120,"mobileDevice":25,"funnelId":111,"funnelDomain":104,"stepId":113,"locationId":108,"funnelPageId":106,"locationCode":204,"funnelNextStep":29,"fingerprint":29,"funnelNextPageId":29,"stripePublishableKey":205,"enablePaymentElement":25,"merchantLoginId":29,"paypalPublishableKey":29,"merchantAccountId":-1,"stripeAccountId":206,"isLivePaymentMode":32,"versi
